<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Bernstein Coach PWA v7</title>
  <style>
    :root {
      --bg:#0b0f14; --card:#121a23; --muted:#93a4b5; --text:#e8eef5; --accent:#4dd4ac; --warn:#ffcc66; --danger:#ff6b6b;
      --border: rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text);}
    header{position:sticky; top:0; z-index:10; background:rgba(11,15,20,.92); backdrop-filter: blur(10px); border-bottom:1px solid var(--border);}
    .wrap{max-width:980px;margin:0 auto;padding:14px 14px 80px;}
    .row{display:flex; gap:10px; flex-wrap:wrap;}
    h2{font-size:14px;margin:14px 0 8px;color:var(--muted); font-weight:600;}
    .tabs{display:flex; gap:8px; padding:10px 14px; overflow:auto;}
    .tab{padding:10px 12px; border:1px solid var(--border); border-radius:999px; color:var(--muted); cursor:pointer; user-select:none; white-space:nowrap;}
    .tab.active{color:var(--bg); background:var(--accent); border-color:transparent; font-weight:700;}
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px;}
    .grid{display:grid; grid-template-columns: 1fr; gap:10px;}
    @media (min-width:860px){ .grid{grid-template-columns: 1.2fr .8fr;} }
    label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
    input, select{width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:#0f1520; color:var(--text);}
    .btn{padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:#0f1520; color:var(--text); cursor:pointer;}
    .btn.primary{background:var(--accent); border-color:transparent; color:var(--bg); font-weight:800;}
    .btn.warn{background:var(--warn); border-color:transparent; color:var(--bg); font-weight:800;}
    .btn.danger{background:var(--danger); border-color:transparent; color:var(--bg); font-weight:900;}
    .pill{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); color:var(--muted); font-size:12px;}
    .pill.warn{border-color: rgba(255,204,102,.35); color: var(--warn);}
    .pill.danger{border-color: rgba(255,107,107,.35); color: var(--danger);}
    .muted{color:var(--muted);}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .hr{height:1px;background:var(--border);margin:10px 0;}
    .foodrow{display:flex; justify-content:space-between; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);}
    .foodrow:last-child{border-bottom:none;}
    .small{font-size:12px;}
    .right{text-align:right;}
    .seg{display:flex; gap:8px; flex-wrap:wrap;}
    .seg .btn{border-radius:999px; padding:8px 10px;}
    .kpi{display:flex; justify-content:space-between; gap:10px; align-items:baseline;}
    .kpi .val{font-size:22px; font-weight:900;}
    .kbd{padding:2px 6px;border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--muted);}
    .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:18px; background:#0f1520; border:1px solid var(--border); padding:10px 12px; border-radius:12px; color:var(--text); max-width:92vw; display:none;}
  </style>
</head>

function $(sel){ return document.querySelector(sel); }
function el(tag, attrs={}, children=[]) {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const c of children) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  return n;
}
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=> t.style.display="none", 2200);
}

const storageKey = "bernstein_coach_v7_state";
function loadState() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return {
      settings: structuredClone(V7.defaultSettings),
      meal: [],
      bg_mgdl: "",
      notes: "",
      lastTab: "Calculator",
      foodSearch: "",
      foodCategory: "All",
    };
    const s = JSON.parse(raw);
    s.settings = Object.assign(structuredClone(V7.defaultSettings), s.settings || {});
    s.meal = Array.isArray(s.meal) ? s.meal : [];
    s.lastTab = s.lastTab || "Calculator";
    s.foodSearch = s.foodSearch || "";
    s.foodCategory = s.foodCategory || "All";
    return s;
  } catch(e) {
    return {
      settings: structuredClone(V7.defaultSettings),
      meal: [],
      bg_mgdl: "",
      notes: "",
      lastTab: "Calculator",
      foodSearch: "",
      foodCategory: "All",
    };
  }
}
function saveState(){ localStorage.setItem(storageKey, JSON.stringify(state)); }
let state = loadState();

function carbsForFood(food, qty, rawCookedState=null) {
  if (food.unit === "tablet") return (food.carbs_per_tablet_g || 0) * qty;
  if (food.net_carbs_per_100g != null) return (food.net_carbs_per_100g * qty) / 100.0;
  if (food.toggle_raw_cooked) {
    const mode = rawCookedState || food.default_state || "cooked";
    const per100 = (mode === "raw") ? food.carbs_raw_per_100g : food.carbs_cooked_per_100g;
    return (per100 * qty) / 100.0;
  }
  const per100 = food.carbs_cooked_per_100g ?? food.carbs_per_100g ?? 0;
  return (per100 * qty) / 100.0;
}

function mealTotals() {
  let carbs = 0;
  let warnings = 0;
  for (const item of state.meal) {
    const food = V7.foods.find(f=>f.id===item.food_id);
    if (!food) continue;
    carbs += carbsForFood(food, item.qty, item.mode);
    if (food.warning) warnings++;
    if ((food.category||"").includes("Limited")) warnings++;
  }
  return { carbs, warnings };
}

function correctionInsulinUnits(bg) {
  const target = state.settings.target_bg_mgdl;
  const isf = state.settings.isf_mgdl_per_u;
  const delta = bg - target;
  if (!isf || isf <= 0 || delta <= 0) return 0;
  return delta / isf;
}

function hypoTabletsNeeded(bg) {
  const target = state.settings.target_bg_mgdl;
  const csf = state.settings.carb_sensitivity_mgdl_per_tab || 15;
  const delta = target - bg;
  if (!csf || csf <= 0 || delta <= 0) return 0;
  return Math.max(1, Math.ceil(delta / csf));
}

function renderTabs() {
  const tabs = ["Calculator","Foods","Templates","Settings"];
  const host = $("#tabs");
  host.innerHTML = "";
  tabs.forEach(t=> {
    host.appendChild(el("div", {
      class: "tab" + (state.lastTab===t ? " active":""),
      onclick: ()=>{ state.lastTab=t; saveState(); render(); }
    }, [t]));
  });
}

function renderDosePanel(bgNum, mealCarbs) {
  const target = state.settings.target_bg_mgdl;
  const hypoT = state.settings.hypo_threshold;
  const urgentT = state.settings.urgent_hypo_threshold;
  const icr = state.settings.icr_g_per_u;

  if (!Number.isFinite(bgNum) || state.bg_mgdl==="") return el("div", {class:"muted"}, ["Enter BG to see guidance."]);

  if (bgNum < hypoT) {
    const urgent = bgNum < urgentT;
    const tabs = hypoTabletsNeeded(bgNum);
    const perTab = state.settings.glucose_tab_grams || 4;
    const grams = tabs * perTab;
    return el("div", {}, [
      el("div", {class: "pill " + (urgent ? "danger":"warn")}, [urgent ? "🚨 URGENT LOW" : "⚠️ LOW BG"]),
      el("div", {style:"height:10px"}),
      el("div", {class:"kpi"}, [
        el("div", {}, [el("div", {class:"muted small"}, ["Treat with glucose tablets"]), el("div", {class:"val mono"}, [String(tabs), " tabs"])]),
        el("div", {class:"right"}, [el("div", {class:"muted small"}, ["≈ " + grams.toFixed(0) + " g glucose"])]),
      ]),
      el("div", {class:"muted small", style:"margin-top:8px"}, [
        "Typically, 3 glucose tablets (≈12g glucose) are taken to treat a low blood sugar, then blood glucose should be rechecked after 15 minutes."
      ]),
      el("div", {class:"hr"}),
      el("div", {class:"muted small"}, [
        "If severe symptoms or cannot swallow: follow your emergency plan (glucagon if prescribed) and seek urgent help."
      ])
    ]);
  }

  const corr = correctionInsulinUnits(bgNum);
  const mealU = (icr && icr>0) ? (mealCarbs / icr) : 0;
  const total = corr + mealU;

  return el("div", {}, [
    el("div", {class:"row"}, [
      el("span", {class:"pill"}, ["ISF ", el("span", {class:"mono"}, [String(state.settings.isf_mgdl_per_u)]), " mg/dL/U"]),
      el("span", {class:"pill"}, ["ICR ", el("span", {class:"mono"}, [String(icr)]), " g/U"]),
      el("span", {class:"pill"}, ["Target ", el("span", {class:"mono"}, [String(target)]), " mg/dL"]),
    ]),
    el("div", {style:"height:10px"}),
    el("div", {class:"kpi"}, [
      el("div", {}, [el("div", {class:"muted small"}, ["Meal insulin (carbs/ICR)"]), el("div", {class:"val mono"}, [mealU.toFixed(2), " U"])]),
      el("div", {class:"right"}, [el("div", {class:"muted small"}, ["Correction insulin"]), el("div", {class:"val mono"}, [corr.toFixed(2), " U"])]),
    ]),
    el("div", {class:"hr"}),
    el("div", {class:"kpi"}, [
      el("div", {}, [el("div", {class:"muted small"}, ["Suggested total (meal + correction)"]), el("div", {class:"val mono"}, [total.toFixed(2), " U"])]),
      el("div", {class:"right muted small"}, ["(Guidance only)"]
    ]),
  ]);
}

function exportSummary() {
  const t = mealTotals();
  const carbs = t.carbs;
  const bgNum = Number(state.bg_mgdl);
  const corr = Number.isFinite(bgNum) ? correctionInsulinUnits(bgNum) : 0;
  const icr = state.settings.icr_g_per_u;
  const mealU = (icr && icr>0) ? carbs/icr : 0;
  const total = corr + mealU;
  const lines = [];
  lines.push("Bernstein Coach v7 summary");
  lines.push("Meal carbs: " + carbs.toFixed(1) + " g");
  if (state.bg_mgdl!=="") lines.push("BG: " + state.bg_mgdl + " mg/dL (target " + state.settings.target_bg_mgdl + ")");
  lines.push("Meal insulin: " + mealU.toFixed(2) + " U (ICR " + state.settings.icr_g_per_u + " g/U)");
  lines.push("Correction: " + corr.toFixed(2) + " U (ISF " + state.settings.isf_mgdl_per_u + " mg/dL/U)");
  lines.push("Suggested total: " + total.toFixed(2) + " U");
  lines.push("Items:");
  for (const it of state.meal) {
    const f = V7.foods.find(x=>x.id===it.food_id);
    const c = f ? carbsForFood(f, it.qty, it.mode) : 0;
    const mode = f && f.toggle_raw_cooked ? (" (" + ((it.mode||f.default_state)==="raw" ? "raw" : "cooked") + ")") : "";
    lines.push("- " + (f?f.name:it.food_id) + mode + ": " + it.qty + (f?.unit||"g") + " -> " + c.toFixed(1) + " g");
  }
  if (state.notes) lines.push("Notes: " + state.notes);
  return lines.join("\n");
}

function renderCalculator() {
  const t = mealTotals();
  const carbs = t.carbs;
  const warnings = t.warnings;
  const bgNum = Number(state.bg_mgdl);

  const left = el("div", {class:"card"}, [
    el("div", {class:"kpi"}, [
      el("div", {}, [el("div", {class:"muted small"}, ["Meal net carbs"]), el("div", {class:"val mono"}, [carbs.toFixed(1) + " g"])]),
      el("div", {class:"right"}, [
        warnings>0 ? el("span", {class:"pill warn"}, ["⚠️ limited foods"]) : el("span", {class:"pill"}, ["✓ predictable"]),
      ])
    ]),
    el("div", {class:"hr"}),
    el("div", {class:"row"}, [
      el("div", {style:"flex:1; min-width:220px;"}, [
        el("label", {}, ["Current BG (mg/dL)"]),
        el("input", {inputmode:"numeric", placeholder:"e.g. 110", value: state.bg_mgdl,
          oninput:(e)=>{ state.bg_mgdl=e.target.value; saveState(); render(); }
        }),
      ]),
      el("div", {style:"flex:1; min-width:220px;"}, [
        el("label", {}, ["Notes (optional)"]),
        el("input", {placeholder:"e.g. post-workout / stress / IOB", value: state.notes,
          oninput:(e)=>{ state.notes=e.target.value; saveState(); }
        }),
      ]),
    ]),
    el("div", {class:"hr"}),
    renderDosePanel(bgNum, carbs),
  ]);

  const right = el("div", {class:"card"}, [
    el("h2", {}, ["Meal items"]),
    state.meal.length===0 ? el("div", {class:"muted"}, ["No items yet. Go to Foods → add items."]) :
      el("div", {}, state.meal.map((it, idx)=>{
        const food = V7.foods.find(f=>f.id===it.food_id);
        const c = food ? carbsForFood(food, it.qty, it.mode) : 0;
        const mode = food?.toggle_raw_cooked ? ((it.mode||food.default_state)==="raw" ? "Raw/Dry · " : "Cooked · ") : "";
        return el("div", {class:"foodrow"}, [
          el("div", {}, [
            el("div", {}, [food ? food.name : it.food_id]),
            el("div", {class:"muted small"}, [mode + it.qty + " " + (food?.unit || "g") + " · " + c.toFixed(1) + " g carbs"]),
          ]),
          el("button", {class:"btn", onclick:()=>{ state.meal.splice(idx,1); saveState(); render(); toast("Removed"); } }, ["Remove"]),
        ]);
      }))
    ,
    el("div", {class:"hr"}),
    el("div", {class:"row"}, [
      el("button", {class:"btn", onclick:()=>{ state.meal=[]; saveState(); render(); toast("Meal reset"); } }, ["Reset meal"]),
      el("button", {class:"btn primary", onclick:()=>{ navigator.clipboard?.writeText(exportSummary()); toast("Copied summary"); } }, ["Copy summary"]),
    ]),
    el("div", {class:"muted small", style:"margin-top:8px"}, [
      "Tip: With ⚠️ limited foods, consider checking BG at 1–2h and 3–4h."
    ])
  ]);

  return el("div", {class:"grid"}, [left, right]);
}

function ensureMealItem(food) {
  let idx = state.meal.findIndex(it => it.food_id===food.id);
  if (idx < 0) {
    state.meal.push({food_id: food.id, qty: food.unit==="tablet"?3:(food.presets?.[0]||food.presets_cooked?.[0]||50), mode: food.toggle_raw_cooked ? (food.default_state||"cooked") : null });
    idx = state.meal.length - 1;
  }
  return idx;
}
function setFoodMode(food, mode) {
  const idx = ensureMealItem(food);
  state.meal[idx].mode = mode;
  saveState(); render();
}
function setFoodQty(food, qty, silent=false) {
  const idx = ensureMealItem(food);
  const q = Math.max(0, Math.round(Number(qty)));
  state.meal[idx].qty = q;
  saveState(); render();
  if (!silent) toast("Set " + food.name);
}
function adjustFood(food, delta) {
  const idx = ensureMealItem(food);
  const step = (food.unit==="tablet") ? 1 : 5;
  state.meal[idx].qty = Math.max(0, (state.meal[idx].qty||0) + delta*step);
  saveState(); render();
}
function addOrUpdateMeal(food) {
  ensureMealItem(food);
  saveState(); render();
  toast("Saved to meal");
}
function removeFromMeal(food) {
  const idx = state.meal.findIndex(it => it.food_id===food.id);
  if (idx>=0) state.meal.splice(idx,1);
  saveState(); render();
  toast("Removed");
}

function foodCard(food) {
  const mealItemIdx = state.meal.findIndex(it => it.food_id===food.id);
  const existing = mealItemIdx >= 0 ? state.meal[mealItemIdx] : null;
  const mode = existing?.mode || food.default_state || (food.toggle_raw_cooked ? "cooked" : null);
  const qty = existing?.qty || (food.unit==="tablet" ? 3 : (food.presets?.[0] || food.presets_cooked?.[0] || 50));
  const c = carbsForFood(food, qty, mode);

  const per100 = (()=>{
    if (food.unit==="tablet") return null;
    if (food.net_carbs_per_100g!=null) return food.net_carbs_per_100g;
    if (food.toggle_raw_cooked) return (mode==="raw") ? food.carbs_raw_per_100g : food.carbs_cooked_per_100g;
    return food.carbs_cooked_per_100g ?? food.carbs_per_100g ?? null;
  })();

  const header = el("div", {class:"row", style:"justify-content:space-between; align-items:flex-start;"}, [
    el("div", {}, [
      el("div", {}, [food.name + (food.warning ? " ⚠️" : "")]),
      el("div", {class:"muted small"}, [
        food.category +
        (per100!=null ? (" · " + per100 + " g/100g" + (food.net_carbs_per_100g!=null ? " (net)" : "")) : "") +
        (food.unit==="tablet" ? (" · " + (food.carbs_per_tablet_g||0) + " g/tab") : "")
      ]),
    ]),
    el("div", {class:"right"}, [
      el("div", {class:"muted small"}, ["This portion"]),
      el("div", {class:"mono", style:"font-size:18px;font-weight:900;"}, [c.toFixed(1) + " g"]),
    ])
  ]);

  const modeSeg = food.toggle_raw_cooked ? el("div", {class:"seg", style:"margin-top:10px;"}, [
    el("button", {class:"btn" + (mode==="raw" ? " primary":""), onclick:()=>setFoodMode(food, "raw")}, ["Raw/Dry"]),
    el("button", {class:"btn" + (mode==="cooked" ? " primary":""), onclick:()=>setFoodMode(food, "cooked")}, ["Cooked"]),
  ]) : el("span");

  const presets = (()=>{
    if (food.unit==="tablet") return [1,2,3,4];
    if (food.toggle_raw_cooked) return (mode==="raw" ? (food.presets_raw||[10,20,30]) : (food.presets_cooked||[50,75,100]));
    return food.presets || [50,75,100];
  })();

  const presetButtons = el("div", {class:"seg", style:"margin-top:10px;"}, presets.map(p =>
    el("button", {class:"btn", onclick:()=>setFoodQty(food, p)}, [String(p) + " " + (food.unit||"g")])
  ));

  const counter = el("div", {class:"row", style:"margin-top:10px; align-items:center;"}, [
    el("button", {class:"btn", onclick:()=>adjustFood(food, -1)}, ["−"]),
    el("div", {style:"flex:1;"}, [
      el("input", {value: qty, inputmode:"numeric",
        oninput:(e)=>setFoodQty(food, e.target.value, true)
      }),
      el("div", {class:"muted small"}, ["Quantity in " + (food.unit==="tablet"?"tablets":"grams") + "."])
    ]),
    el("button", {class:"btn", onclick:()=>adjustFood(food, +1)}, ["+"]),
  ]);

  const actions = el("div", {class:"row", style:"margin-top:10px;"}, [
    el("button", {class:"btn primary", onclick:()=>addOrUpdateMeal(food)}, [existing ? "Update meal" : "Add to meal"]),
    existing ? el("button", {class:"btn", onclick:()=>removeFromMeal(food)}, ["Remove"]) : el("button", {class:"btn", onclick:()=>toast("Pick a portion then Add")}, ["Info"]),
  ]);

  const note = food.notes ? el("div", {class:"muted small", style:"margin-top:10px;"}, [food.notes]) : el("span");

  return el("div", {class:"card"}, [header, modeSeg, presetButtons, counter, actions, note]);
}

function renderFoods() {
  const cats = ["All", ...Array.from(new Set(V7.foods.map(f=>f.category))).sort()];
  const search = (state.foodSearch||"").toLowerCase().trim();
  const cat = state.foodCategory || "All";

  const list = V7.foods
    .filter(f => (cat==="All" || f.category===cat))
    .filter(f => !search || f.name.toLowerCase().includes(search))
    .sort((a,b)=>a.name.localeCompare(b.name));

  const top = el("div", {class:"card"}, [
    el("div", {class:"row"}, [
      el("div", {style:"flex:1; min-width:220px;"}, [
        el("label", {}, ["Search"]),
        el("input", {placeholder:"type a food (e.g. rice, avocado, nuts)", value: state.foodSearch,
          oninput:(e)=>{ state.foodSearch=e.target.value; saveState(); render(); }
        }),
      ]),
      el("div", {style:"flex:1; min-width:220px;"}, [
        el("label", {}, ["Category"]),
        el("select", {onchange:(e)=>{ state.foodCategory=e.target.value; saveState(); render(); } }, [
          ...cats.map(c=> el("option", {value:c, selected: c===cat}, [c]))
        ]),
      ]),
    ]),
    el("div", {class:"muted small", style:"margin-top:8px"}, [
      "For grains/legumes, use ", el("span", {class:"kbd"}, ["Raw/Dry"]), " when possible for best accuracy."
    ]),
  ]);

  return el("div", {class:"row", style:"flex-direction:column; gap:10px;"}, [top, ...list.map(foodCard)]);
}

function loadTemplate(t) {
  state.meal = t.items.map(it => ({food_id: it.food_id, qty: it.qty, mode: null}));
  saveState(); render();
  toast("Loaded " + t.name);
  state.lastTab = "Calculator"; saveState(); render();
}

function renderTemplates() {
  const header = el("div", {class:"card"}, [
    el("div", {class:"row", style:"justify-content:space-between; align-items:center;"}, [
      el("div", {}, [
        el("div", {}, ["Meal templates (25)"]),
        el("div", {class:"muted small"}, ["Tap one to load it into the current meal."]),
      ]),
      el("button", {class:"btn", onclick:()=>{ state.meal=[]; saveState(); render(); toast("Meal cleared"); } }, ["Clear meal"]),
    ]),
  ]);

  const list = V7.templates.map(t => el("div", {class:"card"}, [
    el("div", {class:"row", style:"justify-content:space-between; align-items:center;"}, [
      el("div", {}, [el("div", {}, [t.name]), el("div", {class:"muted small"}, [t.note])]),
      el("button", {class:"btn primary", onclick:()=>loadTemplate(t)}, ["Load"]),
    ]),
  ]));

  return el("div", {class:"row", style:"flex-direction:column; gap:10px;"}, [header, ...list]);
}

function clampInt(v, lo, hi) {
  const n = Math.round(Number(v));
  if (!Number.isFinite(n)) return lo;
  return Math.min(hi, Math.max(lo, n));
}
function clampFloat(v, lo, hi) {
  const n = Number(v);
  if (!Number.isFinite(n)) return lo;
  return Math.min(hi, Math.max(lo, n));
}
function field(labelText, value, onChange) {
  return el("div", {style:"flex:1; min-width:220px;"}, [
    el("label", {}, [labelText]),
    el("input", {value: value, inputmode:"numeric", oninput:(e)=>onChange(e.target.value)}),
  ]);
}

function renderSettings() {
  const s = state.settings;
  const card = el("div", {class:"card"}, [
    el("h2", {}, ["Calibration"]),
    el("div", {class:"row"}, [
      field("Target BG (mg/dL)", s.target_bg_mgdl, (v)=>{ s.target_bg_mgdl = clampInt(v, 60, 140); saveState(); render(); }),
      field("ISF (mg/dL per 1U)", s.isf_mgdl_per_u, (v)=>{ s.isf_mgdl_per_u = clampInt(v, 10, 200); saveState(); render(); }),
      field("ICR (grams per 1U)", s.icr_g_per_u, (v)=>{ s.icr_g_per_u = clampInt(v, 1, 50); saveState(); render(); }),
    ]),
    el("div", {class:"hr"}),
    el("h2", {}, ["Low BG (glucose tablets)"]),
    el("div", {class:"row"}, [
      field("Tablet grams", s.glucose_tab_grams, (v)=>{ s.glucose_tab_grams = clampFloat(v, 1, 10); saveState(); render(); }),
      field("Carb sensitivity (mg/dL per tablet)", s.carb_sensitivity_mgdl_per_tab, (v)=>{ s.carb_sensitivity_mgdl_per_tab = clampInt(v, 5, 40); saveState(); render(); }),
      field("Hypo threshold (mg/dL)", s.hypo_threshold, (v)=>{ s.hypo_threshold = clampInt(v, 60, 80); saveState(); render(); }),
      field("Urgent hypo (mg/dL)", s.urgent_hypo_threshold, (v)=>{ s.urgent_hypo_threshold = clampInt(v, 40, 60); saveState(); render(); }),
    ]),
    el("div", {class:"hr"}),
    el("div", {class:"row"}, [
      el("button", {class:"btn", onclick:()=>{ localStorage.removeItem(storageKey); state=loadState(); renderTabs(); render(); toast("Reset app data"); } }, ["Factory reset"]),
      el("button", {class:"btn primary", onclick:()=>{ navigator.clipboard?.writeText(JSON.stringify(state,null,2)); toast("Copied state JSON"); } }, ["Copy state JSON"]),
    ]),
    el("div", {class:"muted small", style:"margin-top:8px"}, ["Version: ", el("span", {class:"mono"}, [V7.version])])
  ]);

  const info = el("div", {class:"card"}, [
    el("h2", {}, ["Install on iPhone (Safari)"]),
    el("div", {class:"muted small"}, ["Open this site in Safari → Share → Add to Home Screen. After first load it works offline."])
  ]);

  return el("div", {class:"row", style:"flex-direction:column; gap:10px;"}, [card, info]);
}

function render() {
  renderTabs();
  const host = $("#view");
  host.innerHTML = "";
  if (state.lastTab==="Calculator") host.appendChild(renderCalculator());
  else if (state.lastTab==="Foods") host.appendChild(renderFoods());
  else if (state.lastTab==="Templates") host.appendChild(renderTemplates());
  else host.appendChild(renderSettings());
}
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
