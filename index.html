<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Bernstein Coach PWA v7.1</title>
  <style>
    :root {
      --bg:#0b0f14;
      --card:#121a23;
      --muted:#93a4b5;
      --text:#e8eef5;
      --accent:#4dd4ac;
      --warn:#ffcc66;
      --danger:#ff6b6b;
      --border: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,15,20,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 14px 80px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    h2 {
      font-size: 14px;
      margin: 14px 0 8px;
      color: var(--muted);
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      overflow: auto;
    }

    .tab {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--bg);
      background: var(--accent);
      border-color: transparent;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: 1.2fr .8fr;
      }
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1520;
      color: var(--text);
    }

    .btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1520;
      color: var(--text);
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: var(--bg);
      font-weight: 800;
    }

    .btn.warn {
      background: var(--warn);
      border-color: transparent;
      color: var(--bg);
      font-weight: 800;
    }

    .btn.danger {
      background: var(--danger);
      border-color: transparent;
      color: var(--bg);
      font-weight: 900;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }

    .pill.warn {
      border-color: rgba(255,204,102,.35);
      color: var(--warn);
    }

    .pill.danger {
      border-color: rgba(255,107,107,.35);
      color: var(--danger);
    }

    .muted { color: var(--muted); }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .hr {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .foodrow {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .foodrow:last-child { border-bottom: none; }

    .small { font-size: 12px; }

    .right { text-align: right; }

    .seg {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .seg .btn {
      border-radius: 999px;
      padding: 8px 10px;
    }

    .kpi {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .kpi .val {
      font-size: 22px;
      font-weight: 900;
    }

    .kbd {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18px;
      background: #0f1520;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--text);
      max-width: 92vw;
      display: none;
    }
  </style>
</head>

function $(sel) {
  return document.querySelector(sel);
}

function el(tag, attrs, children) {
  var n = document.createElement(tag);
  var k;
  attrs = attrs || {};
  children = children || [];

  for (k in attrs) {
    if (Object.prototype.hasOwnProperty.call(attrs, k)) {
      if (k === "class") {
        n.className = attrs[k];
      } else if (k === "html") {
        n.innerHTML = attrs[k];
      } else if (k.indexOf("on") === 0 && typeof attrs[k] === "function") {
        n.addEventListener(k.slice(2), attrs[k]);
      } else {
        n.setAttribute(k, attrs[k]);
      }
    }
  }

  for (k = 0; k < children.length; k++) {
    if (typeof children[k] === "string") {
      n.appendChild(document.createTextNode(children[k]));
    } else if (children[k]) {
      n.appendChild(children[k]);
    }
  }

  return n;
}

function toast(msg) {
  var t = $("#toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(function() {
    t.style.display = "none";
  }, 2200);
}

var storageKey = "bernstein_coach_v7_state";

function loadState() {
  try {
    var raw = localStorage.getItem(storageKey);
    if (!raw) {
      return {
        settings: deepClone(V7.defaultSettings),
        meal: [],
        bg_mgdl: "",
        notes: "",
        lastTab: "Calculator",
        foodSearch: "",
        foodCategory: "All"
      };
    }

    var s = JSON.parse(raw);
    s.settings = Object.assign(deepClone(V7.defaultSettings), s.settings || {});
    s.meal = Array.isArray(s.meal) ? s.meal : [];
    s.lastTab = s.lastTab || "Calculator";
    s.foodSearch = s.foodSearch || "";
    s.foodCategory = s.foodCategory || "All";
    return s;
  } catch (e) {
    return {
      settings: deepClone(V7.defaultSettings),
      meal: [],
      bg_mgdl: "",
      notes: "",
      lastTab: "Calculator",
      foodSearch: "",
      foodCategory: "All"
    };
  }
}

function saveState() {
  localStorage.setItem(storageKey, JSON.stringify(state));
}

var state = loadState();

function findFoodById(id) {
  var i;
  for (i = 0; i < V7.foods.length; i++) {
    if (V7.foods[i].id === id) return V7.foods[i];
  }
  return null;
}

function carbsForFood(food, qty, rawCookedState) {
  if (food.unit === "tablet") {
    return (food.carbs_per_tablet_g || 0) * qty;
  }

  if (food.net_carbs_per_100g != null) {
    return (food.net_carbs_per_100g * qty) / 100.0;
  }

  if (food.toggle_raw_cooked) {
    var mode = rawCookedState || food.default_state || "cooked";
    var per100Toggle = (mode === "raw") ? food.carbs_raw_per_100g : food.carbs_cooked_per_100g;
    return (per100Toggle * qty) / 100.0;
  }

  var per100 = (food.carbs_cooked_per_100g != null)
    ? food.carbs_cooked_per_100g
    : ((food.carbs_per_100g != null) ? food.carbs_per_100g : 0);

  return (per100 * qty) / 100.0;
}

function mealTotals() {
  var carbs = 0;
  var warnings = 0;
  var i;
  for (i = 0; i < state.meal.length; i++) {
    var item = state.meal[i];
    var food = findFoodById(item.food_id);
    if (!food) continue;
    carbs += carbsForFood(food, item.qty, item.mode);
    if (food.warning) warnings++;
    if ((food.category || "").indexOf("Limited") !== -1) warnings++;
  }
  return { carbs: carbs, warnings: warnings };
}

function correctionInsulinUnits(bg) {
  var target = state.settings.target_bg_mgdl;
  var isf = state.settings.isf_mgdl_per_u;
  var delta = bg - target;
  if (!isf || isf <= 0 || delta <= 0) return 0;
  return delta / isf;
}

function hypoTabletsNeeded(bg) {
  var target = state.settings.target_bg_mgdl;
  var csf = state.settings.carb_sensitivity_mgdl_per_tab || 15;
  var delta = target - bg;
  if (!csf || csf <= 0 || delta <= 0) return 0;
  return Math.max(1, Math.ceil(delta / csf));
}

function renderTabs() {
  var tabs = ["Calculator", "Foods", "Templates", "Settings"];
  var host = $("#tabs");
  var i;

  host.innerHTML = "";

  for (i = 0; i < tabs.length; i++) {
    (function(tabName) {
      host.appendChild(el("div", {
        "class": "tab" + (state.lastTab === tabName ? " active" : ""),
        onclick: function() {
          state.lastTab = tabName;
          saveState();
          render();
        }
      }, [tabName]));
    })(tabs[i]);
  }
}

function renderDosePanel(bgNum, mealCarbs) {
  var target = state.settings.target_bg_mgdl;
  var hypoT = state.settings.hypo_threshold;
  var urgentT = state.settings.urgent_hypo_threshold;
  var icr = state.settings.icr_g_per_u;

  if (!isFinite(bgNum) || state.bg_mgdl === "") {
    return el("div", { "class": "muted" }, ["Enter BG to see guidance."]);
  }

  if (bgNum < hypoT) {
    var urgent = bgNum < urgentT;
    var tabs = hypoTabletsNeeded(bgNum);
    var perTab = state.settings.glucose_tab_grams || 4;
    var grams = tabs * perTab;

    return el("div", {}, [
      el("div", { "class": "pill " + (urgent ? "danger" : "warn") }, [urgent ? "🚨 URGENT LOW" : "⚠️ LOW BG"]),
      el("div", { style: "height:10px" }, []),
      el("div", { "class": "kpi" }, [
        el("div", {}, [
          el("div", { "class": "muted small" }, ["Treat with glucose tablets"]),
          el("div", { "class": "val mono" }, [String(tabs), " tabs"])
        ]),
        el("div", { "class": "right" }, [
          el("div", { "class": "muted small" }, ["≈ " + grams.toFixed(0) + " g glucose"])
        ])
      ]),
      el("div", { "class": "muted small", style: "margin-top:8px" }, [
        "Typically, 3 glucose tablets (≈12g glucose) are taken to treat a low blood sugar, then blood glucose should be rechecked after 15 minutes."
      ]),
      el("div", { "class": "hr" }, []),
      el("div", { "class": "muted small" }, [
        "If severe symptoms or cannot swallow: follow your emergency plan (glucagon if prescribed) and seek urgent help."
      ])
    ]);
  }

  var corr = correctionInsulinUnits(bgNum);
  var mealU = (icr && icr > 0) ? (mealCarbs / icr) : 0;
  var total = corr + mealU;

  return el("div", {}, [
    el("div", { "class": "row" }, [
      el("span", { "class": "pill" }, ["ISF " + state.settings.isf_mgdl_per_u + " mg/dL/U"]),
      el("span", { "class": "pill" }, ["ICR " + icr + " g/U"]),
      el("span", { "class": "pill" }, ["Target " + target + " mg/dL"])
    ]),
    el("div", { style: "height:10px" }, []),
    el("div", { "class": "kpi" }, [
      el("div", {}, [
        el("div", { "class": "muted small" }, ["Meal insulin (carbs/ICR)"]),
        el("div", { "class": "val mono" }, [mealU.toFixed(2) + " U"])
      ]),
      el("div", { "class": "right" }, [
        el("div", { "class": "muted small" }, ["Correction insulin"]),
        el("div", { "class": "val mono" }, [corr.toFixed(2) + " U"])
      ])
    ]),
    el("div", { "class": "hr" }, []),
    el("div", { "class": "kpi" }, [
      el("div", {}, [
        el("div", { "class": "muted small" }, ["Suggested total (meal + correction)"]),
        el("div", { "class": "val mono" }, [total.toFixed(2) + " U"])
      ]),
      el("div", { "class": "right muted small" }, ["(Guidance only)"])
    ])
  ]);
}

function copyText(text, successMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      toast(successMsg);
    }).catch(function() {
      toast("Copy failed");
    });
  } else {
    toast("Clipboard not available");
  }
}

function exportSummary() {
  var totals = mealTotals();
  var carbs = totals.carbs;
  var bgNum = Number(state.bg_mgdl);
  var corr = isFinite(bgNum) ? correctionInsulinUnits(bgNum) : 0;
  var icr = state.settings.icr_g_per_u;
  var mealU = (icr && icr > 0) ? carbs / icr : 0;
  var total = corr + mealU;
  var lines = [];
  var i;

  lines.push("Bernstein Coach v7.1 summary");
  lines.push("Meal carbs: " + carbs.toFixed(1) + " g");
  if (state.bg_mgdl !== "") {
    lines.push("BG: " + state.bg_mgdl + " mg/dL (target " + state.settings.target_bg_mgdl + ")");
  }
  lines.push("Meal insulin: " + mealU.toFixed(2) + " U (ICR " + state.settings.icr_g_per_u + " g/U)");
  lines.push("Correction: " + corr.toFixed(2) + " U (ISF " + state.settings.isf_mgdl_per_u + " mg/dL/U)");
  lines.push("Suggested total: " + total.toFixed(2) + " U");
  lines.push("Items:");

  for (i = 0; i < state.meal.length; i++) {
    var it = state.meal[i];
    var f = findFoodById(it.food_id);
    var c = f ? carbsForFood(f, it.qty, it.mode) : 0;
    var mode = "";
    if (f && f.toggle_raw_cooked) {
      mode = " (" + (((it.mode || f.default_state) === "raw") ? "raw" : "cooked") + ")";
    }
    lines.push("- " + (f ? f.name : it.food_id) + mode + ": " + it.qty + ((f && f.unit) ? f.unit : "g") + " -> " + c.toFixed(1) + " g");
  }

  if (state.notes) {
    lines.push("Notes: " + state.notes);
  }

  return lines.join("\n");
}

function renderCalculator() {
  var totals = mealTotals();
  var carbs = totals.carbs;
  var warnings = totals.warnings;
  var bgNum = Number(state.bg_mgdl);

  var left = el("div", { "class": "card" }, [
    el("div", { "class": "kpi" }, [
      el("div", {}, [
        el("div", { "class": "muted small" }, ["Meal net carbs"]),
        el("div", { "class": "val mono" }, [carbs.toFixed(1) + " g"])
      ]),
      el("div", { "class": "right" }, [
        warnings > 0
          ? el("span", { "class": "pill warn" }, ["⚠️ limited foods"])
          : el("span", { "class": "pill" }, ["✓ predictable"])
      ])
    ]),
    el("div", { "class": "hr" }, []),
    el("div", { "class": "row" }, [
      el("div", { style: "flex:1; min-width:220px;" }, [
        el("label", {}, ["Current BG (mg/dL)"]),
        el("input", {
          inputmode: "numeric",
          placeholder: "e.g. 110",
          value: state.bg_mgdl,
          oninput: function(e) {
            state.bg_mgdl = e.target.value;
            saveState();
            render();
          }
        }, [])
      ]),
      el("div", { style: "flex:1; min-width:220px;" }, [
        el("label", {}, ["Notes (optional)"]),
        el("input", {
          placeholder: "e.g. post-workout / stress / IOB",
          value: state.notes,
          oninput: function(e) {
            state.notes = e.target.value;
            saveState();
          }
        }, [])
      ])
    ]),
    el("div", { "class": "hr" }, []),
    renderDosePanel(bgNum, carbs)
  ]);

  var mealChildren = [];
  if (state.meal.length === 0) {
    mealChildren.push(el("div", { "class": "muted" }, ["No items yet. Go to Foods → add items."]));
  } else {
    var i;
    for (i = 0; i < state.meal.length; i++) {
      (function(idx) {
        var it = state.meal[idx];
        var food = findFoodById(it.food_id);
        var c = food ? carbsForFood(food, it.qty, it.mode) : 0;
        var mode = "";
        if (food && food.toggle_raw_cooked) {
          mode = ((it.mode || food.default_state) === "raw" ? "Raw/Dry · " : "Cooked · ");
        }

        mealChildren.push(el("div", { "class": "foodrow" }, [
          el("div", {}, [
            el("div", {}, [food ? food.name : it.food_id]),
            el("div", { "class": "muted small" }, [mode + it.qty + " " + (food ? food.unit : "g") + " · " + c.toFixed(1) + " g carbs"])
          ]),
          el("button", {
            "class": "btn",
            onclick: function() {
              state.meal.splice(idx, 1);
              saveState();
              render();
              toast("Removed");
            }
          }, ["Remove"])
        ]));
      })(i);
    }
  }

  var rightChildren = [
    el("h2", {}, ["Meal items"])
  ].concat(mealChildren).concat([
    el("div", { "class": "hr" }, []),
    el("div", { "class": "row" }, [
      el("button", {
        "class": "btn",
        onclick: function() {
          state.meal = [];
          saveState();
          render();
          toast("Meal reset");
        }
      }, ["Reset meal"]),
      el("button", {
        "class": "btn primary",
        onclick: function() {
          copyText(exportSummary(), "Copied summary");
        }
      }, ["Copy summary"])
    ]),
    el("div", { "class": "muted small", style: "margin-top:8px" }, [
      "Tip: With ⚠️ limited foods, consider checking BG at 1–2h and 3–4h."
    ])
  ]);

  var right = el("div", { "class": "card" }, rightChildren);

  return el("div", { "class": "grid" }, [left, right]);
}

function ensureMealItem(food) {
  var idx = -1;
  var i;
  for (i = 0; i < state.meal.length; i++) {
    if (state.meal[i].food_id === food.id) {
      idx = i;
      break;
    }
  }

  if (idx < 0) {
    state.meal.push({
      food_id: food.id,
      qty: food.unit === "tablet" ? 3 : (food.presets ? food.presets[0] : (food.presets_cooked ? food.presets_cooked[0] : 50)),
      mode: food.toggle_raw_cooked ? (food.default_state || "cooked") : null
    });
    idx = state.meal.length - 1;
  }

  return idx;
}

function setFoodMode(food, mode) {
  var idx = ensureMealItem(food);
  state.meal[idx].mode = mode;
  saveState();
  render();
}

function setFoodQty(food, qty, silent) {
  var idx = ensureMealItem(food);
  var q = Math.max(0, Math.round(Number(qty)));
  if (!isFinite(q)) q = 0;
  state.meal[idx].qty = q;
  saveState();
  render();
  if (!silent) toast("Set " + food.name);
}

function adjustFood(food, delta) {
  var idx = ensureMealItem(food);
  var step = (food.unit === "tablet") ? 1 : 5;
  state.meal[idx].qty = Math.max(0, (state.meal[idx].qty || 0) + delta * step);
  saveState();
  render();
}

function addOrUpdateMeal(food) {
  ensureMealItem(food);
  saveState();
  render();
  toast("Saved to meal");
}

function removeFromMeal(food) {
  var i;
  for (i = 0; i < state.meal.length; i++) {
    if (state.meal[i].food_id === food.id) {
      state.meal.splice(i, 1);
      break;
    }
  }
  saveState();
  render();
  toast("Removed");
}

function foodCard(food) {
  var mealItemIdx = -1;
  var i;
  for (i = 0; i < state.meal.length; i++) {
    if (state.meal[i].food_id === food.id) {
      mealItemIdx = i;
      break;
    }
  }

  var existing = mealItemIdx >= 0 ? state.meal[mealItemIdx] : null;
  var mode = existing ? existing.mode : (food.default_state || (food.toggle_raw_cooked ? "cooked" : null));
  var qty = existing ? existing.qty : (food.unit === "tablet" ? 3 : (food.presets ? food.presets[0] : (food.presets_cooked ? food.presets_cooked[0] : 50)));
  var c = carbsForFood(food, qty, mode);

  var per100 = null;
  if (food.unit !== "tablet") {
    if (food.net_carbs_per_100g != null) {
      per100 = food.net_carbs_per_100g;
    } else if (food.toggle_raw_cooked) {
      per100 = (mode === "raw") ? food.carbs_raw_per_100g : food.carbs_cooked_per_100g;
    } else {
      per100 = (food.carbs_cooked_per_100g != null)
        ? food.carbs_cooked_per_100g
        : ((food.carbs_per_100g != null) ? food.carbs_per_100g : null);
    }
  }

  var header = el("div", { "class": "row", style: "justify-content:space-between; align-items:flex-start;" }, [
    el("div", {}, [
      el("div", {}, [food.name + (food.warning ? " ⚠️" : "")]),
      el("div", { "class": "muted small" }, [
        food.category +
        (per100 != null ? (" · " + per100 + " g/100g" + (food.net_carbs_per_100g != null ? " (net)" : "")) : "") +
        (food.unit === "tablet" ? (" · " + (food.carbs_per_tablet_g || 0) + " g/tab") : "")
      ])
    ]),
    el("div", { "class": "right" }, [
      el("div", { "class": "muted small" }, ["This portion"]),
      el("div", { "class": "mono", style: "font-size:18px;font-weight:900;" }, [c.toFixed(1) + " g"])
    ])
  ]);

  var modeSeg;
  if (food.toggle_raw_cooked) {
    modeSeg = el("div", { "class": "seg", style: "margin-top:10px;" }, [
      el("button", {
        "class": "btn" + (mode === "raw" ? " primary" : ""),
        onclick: function() { setFoodMode(food, "raw"); }
      }, ["Raw/Dry"]),
      el("button", {
        "class": "btn" + (mode === "cooked" ? " primary" : ""),
        onclick: function() { setFoodMode(food, "cooked"); }
      }, ["Cooked"])
    ]);
  } else {
    modeSeg = el("span", {}, []);
  }

  var presets;
  if (food.unit === "tablet") {
    presets = [1, 2, 3, 4];
  } else if (food.toggle_raw_cooked) {
    presets = (mode === "raw") ? (food.presets_raw || [10, 20, 30]) : (food.presets_cooked || [50, 75, 100]);
  } else {
    presets = food.presets || [50, 75, 100];
  }

  var presetButtonsChildren = [];
  for (i = 0; i < presets.length; i++) {
    (function(p) {
      presetButtonsChildren.push(el("button", {
        "class": "btn",
        onclick: function() { setFoodQty(food, p, false); }
      }, [String(p) + " " + (food.unit || "g")]));
    })(presets[i]);
  }

  var presetButtons = el("div", { "class": "seg", style: "margin-top:10px;" }, presetButtonsChildren);

  var counter = el("div", { "class": "row", style: "margin-top:10px; align-items:center;" }, [
    el("button", { "class": "btn", onclick: function() { adjustFood(food, -1); } }, ["−"]),
    el("div", { style: "flex:1;" }, [
      el("input", {
        value: qty,
        inputmode: "numeric",
        oninput: function(e) { setFoodQty(food, e.target.value, true); }
      }, []),
      el("div", { "class": "muted small" }, ["Quantity in " + (food.unit === "tablet" ? "tablets" : "grams") + "."])
    ]),
    el("button", { "class": "btn", onclick: function() { adjustFood(food, 1); } }, ["+"])
  ]);

  var actions = el("div", { "class": "row", style: "margin-top:10px;" }, [
    el("button", {
      "class": "btn primary",
      onclick: function() { addOrUpdateMeal(food); }
    }, [existing ? "Update meal" : "Add to meal"]),
    existing
      ? el("button", {
          "class": "btn",
          onclick: function() { removeFromMeal(food); }
        }, ["Remove"])
      : el("button", {
          "class": "btn",
          onclick: function() { toast("Pick a portion then Add"); }
        }, ["Info"])
  ]);

  var note = food.notes
    ? el("div", { "class": "muted small", style: "margin-top:10px;" }, [food.notes])
    : el("span", {}, []);

  return el("div", { "class": "card" }, [header, modeSeg, presetButtons, counter, actions, note]);
}

function renderFoods() {
  var cats = ["All"];
  var i;
  var seen = {};

  for (i = 0; i < V7.foods.length; i++) {
    if (!seen[V7.foods[i].category]) {
      seen[V7.foods[i].category] = true;
      cats.push(V7.foods[i].category);
    }
  }

  cats.sort(function(a, b) {
    if (a === "All") return -1;
    if (b === "All") return 1;
    return a.localeCompare(b);
  });

  var search = (state.foodSearch || "").toLowerCase().trim();
  var cat = state.foodCategory || "All";

  var list = [];
  for (i = 0; i < V7.foods.length; i++) {
    var food = V7.foods[i];
    if (cat !== "All" && food.category !== cat) continue;
    if (search && food.name.toLowerCase().indexOf(search) === -1) continue;
    list.push(food);
  }

  list.sort(function(a, b) {
    return a.name.localeCompare(b.name);
  });

  var options = [];
  for (i = 0; i < cats.length; i++) {
    options.push(el("option", {
      value: cats[i],
      selected: cats[i] === cat ? "selected" : null
    }, [cats[i]]));
  }

  var top = el("div", { "class": "card" }, [
    el("div", { "class": "row" }, [
      el("div", { style: "flex:1; min-width:220px;" }, [
        el("label", {}, ["Search"]),
        el("input", {
          placeholder: "type a food (e.g. rice, avocado, nuts)",
          value: state.foodSearch,
          oninput: function(e) {
            state.foodSearch = e.target.value;
            saveState();
            render();
          }
        }, [])
      ]),
      el("div", { style: "flex:1; min-width:220px;" }, [
        el("label", {}, ["Category"]),
        el("select", {
          onchange: function(e) {
            state.foodCategory = e.target.value;
            saveState();
            render();
          }
        }, options)
      ])
    ]),
    el("div", { "class": "muted small", style: "margin-top:8px" }, [
      "For grains/legumes, use ",
      el("span", { "class": "kbd" }, ["Raw/Dry"]),
      " when possible for best accuracy."
    ])
  ]);

  var children = [top];
  for (i = 0; i < list.length; i++) {
    children.push(foodCard(list[i]));
  }

  return el("div", { "class": "row", style: "flex-direction:column; gap:10px;" }, children);
}

function loadTemplate(t) {
  var i;
  state.meal = [];
  for (i = 0; i < t.items.length; i++) {
    state.meal.push({
      food_id: t.items[i].food_id,
      qty: t.items[i].qty,
      mode: null
    });
  }
  saveState();
  render();
  toast("Loaded " + t.name);
  state.lastTab = "Calculator";
  saveState();
  render();
}

function renderTemplates() {
  var header = el("div", { "class": "card" }, [
    el("div", { "class": "row", style: "justify-content:space-between; align-items:center;" }, [
      el("div", {}, [
        el("div", {}, ["Meal templates (25)"]),
        el("div", { "class": "muted small" }, ["Tap one to load it into the current meal."])
      ]),
      el("button", {
        "class": "btn",
        onclick: function() {
          state.meal = [];
          saveState();
          render();
          toast("Meal cleared");
        }
      }, ["Clear meal"])
    ])
  ]);

  var children = [header];
  var i;
  for (i = 0; i < V7.templates.length; i++) {
    (function(t) {
      children.push(el("div", { "class": "card" }, [
        el("div", { "class": "row", style: "justify-content:space-between; align-items:center;" }, [
          el("div", {}, [
            el("div", {}, [t.name]),
            el("div", { "class": "muted small" }, [t.note])
          ]),
          el("button", {
            "class": "btn primary",
            onclick: function() { loadTemplate(t); }
          }, ["Load"])
        ])
      ]));
    })(V7.templates[i]);
  }

  return el("div", { "class": "row", style: "flex-direction:column; gap:10px;" }, children);
}

function clampInt(v, lo, hi) {
  var n = Math.round(Number(v));
  if (!isFinite(n)) return lo;
  return Math.min(hi, Math.max(lo, n));
}

function clampFloat(v, lo, hi) {
  var n = Number(v);
  if (!isFinite(n)) return lo;
  return Math.min(hi, Math.max(lo, n));
}

function field(labelText, value, onChange) {
  return el("div", { style: "flex:1; min-width:220px;" }, [
    el("label", {}, [labelText]),
    el("input", {
      value: value,
      inputmode: "numeric",
      oninput: function(e) { onChange(e.target.value); }
    }, [])
  ]);
}

function renderSettings() {
  var s = state.settings;

  var card = el("div", { "class": "card" }, [
    el("h2", {}, ["Calibration"]),
    el("div", { "class": "row" }, [
      field("Target BG (mg/dL)", s.target_bg_mgdl, function(v) {
        s.target_bg_mgdl = clampInt(v, 60, 140);
        saveState();
        render();
      }),
      field("ISF (mg/dL per 1U)", s.isf_mgdl_per_u, function(v) {
        s.isf_mgdl_per_u = clampInt(v, 10, 200);
        saveState();
        render();
      }),
      field("ICR (grams per 1U)", s.icr_g_per_u, function(v) {
        s.icr_g_per_u = clampInt(v, 1, 50);
        saveState();
        render();
      })
    ]),
    el("div", { "class": "hr" }, []),
    el("h2", {}, ["Low BG (glucose tablets)"]),
    el("div", { "class": "row" }, [
      field("Tablet grams", s.glucose_tab_grams, function(v) {
        s.glucose_tab_grams = clampFloat(v, 1, 10);
        saveState();
        render();
      }),
      field("Carb sensitivity (mg/dL per tablet)", s.carb_sensitivity_mgdl_per_tab, function(v) {
        s.carb_sensitivity_mgdl_per_tab = clampInt(v, 5, 40);
        saveState();
        render();
      }),
      field("Hypo threshold (mg/dL)", s.hypo_threshold, function(v) {
        s.hypo_threshold = clampInt(v, 60, 80);
        saveState();
        render();
      }),
      field("Urgent hypo (mg/dL)", s.urgent_hypo_threshold, function(v) {
        s.urgent_hypo_threshold = clampInt(v, 40, 60);
        saveState();
        render();
      })
    ]),
    el("div", { "class": "hr" }, []),
    el("div", { "class": "row" }, [
      el("button", {
        "class": "btn",
        onclick: function() {
          localStorage.removeItem(storageKey);
          state = loadState();
          renderTabs();
          render();
          toast("Reset app data");
        }
      }, ["Factory reset"]),
      el("button", {
        "class": "btn primary",
        onclick: function() {
          copyText(JSON.stringify(state, null, 2), "Copied state JSON");
        }
      }, ["Copy state JSON"])
    ]),
    el("div", { "class": "muted small", style: "margin-top:8px" }, [
      "Version: ",
      el("span", { "class": "mono" }, [V7.version])
    ])
  ]);

  var info = el("div", { "class": "card" }, [
    el("h2", {}, ["Install on iPhone (Safari)"]),
    el("div", { "class": "muted small" }, [
      "Open this site in Safari → Share → Add to Home Screen. After first load it works offline."
    ])
  ]);

  return el("div", { "class": "row", style: "flex-direction:column; gap:10px;" }, [card, info]);
}

function render() {
  renderTabs();
  var host = $("#view");
  host.innerHTML = "";

  if (state.lastTab === "Calculator") {
    host.appendChild(renderCalculator());
  } else if (state.lastTab === "Foods") {
    host.appendChild(renderFoods());
  } else if (state.lastTab === "Templates") {
    host.appendChild(renderTemplates());
  } else {
    host.appendChild(renderSettings());
  }
}

window.onerror = function(msg) {
  var host = $("#view");
  if (host) {
    host.innerHTML = '<div class="card"><h2>App error</h2><div class="muted small">A JavaScript error occurred: ' + String(msg) + '</div></div>';
  }
};

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js").catch(function() {});
  });
}
</script>
</body>
</html>
